<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirigiendo...</title>
    <meta name="robots" content="noindex,follow" />
    <script>
      (function () {
        var locationPath = window.location.pathname + window.location.search + window.location.hash;
        var redirectTarget = "/?p=" + encodeURIComponent(locationPath);
        window.location.replace(redirectTarget);
      })();
    </script>
  </head>
  <body></body>
</html>
